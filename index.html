<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GitHub Tracker</title>
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
    <link rel="shortcut icon" href="/assets/github-logo.png" type="image/x-icon">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>


</head>

<body class="bg-white flex items-center justify-center min-h-screen">

    <div class="card w-96 bg-blue-50 shadow-xl p-6">


        <div class="flex justify-center mb-4">
            <div class="text-4xl"><img src="assets/github-logo.png" alt=""></div>
        </div>


        <h1 class="text-2xl font-bold text-center">Issue Tracker</h1>
        <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>


        <div class="form-control mb-3">
            <label class="label">
                <span class="label-text">Username</span>
            </label>
            <input id="username" type="text" placeholder="Enter username"
                class="input input-bordered bg-white text-black">
        </div>


        <div class="form-control mb-4">
            <label class="label">
                <span class="label-text">Password</span>
            </label>
            <input id="password" type="password" placeholder="Enter password"
                class="input input-bordered bg-white text-black">
        </div>


        <button id="login-btn" class="btn btn-primary w-full">Sign In</button>

        <p class="text-center text-sm text-gray-400 mt-4">
            Default: <span class="font-semibold">admin / admin123</span>
        </p>

    </div>
    <script>


    </script>

    <script src="login.js"></script>
</body>

</html>
